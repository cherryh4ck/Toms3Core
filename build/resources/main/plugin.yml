name: Toms3Core
version: '1.0-SNAPSHOT'
main: io.github.Cherryh4ck.toms3Core.Toms3Core
api-version: '1.21'
authors: [ Cherryh4ck ]
description: Plugin específico para Toms3
commands:
  playtime:
    description: Shows the playtime of a player.
    usage: /playtime [player]
  dupe:
    description: Joke command.
    usage: /dupe
  tmcore:
    description: Toms3 Core main command.
    usage: /tmcore [option]
    permission: tmcore.main